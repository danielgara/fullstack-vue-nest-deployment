services:
  mysql:
    image: mysql:8.4
    container_name: deployment-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "${DB_NAME:-app_db}"
      MYSQL_USER: "${DB_USER:-app_user}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-app_password}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-root_password}"
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      args:
        DB_TYPE: "${DB_TYPE:-mysql}"
        DB_HOST: "${DB_HOST:-mysql}"
        DB_PORT: "${DB_PORT:-3306}"
        DB_USER: "${DB_USER:-app_user}"
        DB_PASSWORD: "${DB_PASSWORD:-app_password}"
        DB_NAME: "${DB_NAME:-app_db}"
        CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:8080,http://127.0.0.1:8080,http://localhost,http://127.0.0.1,http://localhost:5173}"
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_TYPE: "${DB_TYPE:-mysql}"
      DB_HOST: "${DB_HOST:-mysql}"
      DB_PORT: "${DB_PORT:-3306}"
      DB_USER: "${DB_USER:-app_user}"
      DB_PASSWORD: "${DB_PASSWORD:-app_password}"
      DB_NAME: "${DB_NAME:-app_db}"
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:8080,http://127.0.0.1:8080,http://localhost,http://127.0.0.1,http://localhost:5173}"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}

volumes:
  mysql-data:
